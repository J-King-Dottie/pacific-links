name: Collect GitHub traffic

on:
  schedule:
    - cron: "29 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect traffic
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/collect_github_traffic.py --repo "$GITHUB_REPOSITORY"

      - name: Commit updated traffic history
        run: |
          if git diff --quiet -- github-traffic; then
            echo "No traffic changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-traffic
          git commit -m "Track GitHub traffic"
          git push
